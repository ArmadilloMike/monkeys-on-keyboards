<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>100 Monkeys on Keyboards</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 id="header">100 Monkeys on Keyboards</h1>
        <div id="buttons">
            <button id="start-btn">Start</button>
            <button id="stop-btn">Stop</button>
            <button id="mode-btn">Mode: Spam</button>
            <button id="clear-btn">Clear Text</button>
            <button id="print-btn">Print Current Output</button>
        </div>
        <span id="status"></span>
        <div id="speed-slider">
            <span class="slider-label">Faster</span>
            <input type="range" min="10" max="1000" value="250" class="slider" id="speedslider">
            <span class="slider-label">Slower</span>
        </div>
    </header>

    <section id="monkey-gifs">

    </section>

    <section id="output-text">
    </section>

    <script src="script.js"></script>
</body>
</html>
